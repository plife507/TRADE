# concept: trend_following
version: "3.0.0"
name: "sol_ema_trend_15m"
description: |
  SOL EMA Crossover Trend Following on 15m (v3)

  Uses slower 20/50 EMA pair for more reliable crossovers.
  ADX > 25 requires stronger trend. RSI confirms momentum direction.
  20% equity per trade, 5x leverage, ATR 2.5x SL with 3R TP.

symbol: "SOLUSDT"

timeframes:
  low_tf: "15m"
  med_tf: "1h"
  high_tf: "4h"
  exec: "low_tf"

account:
  starting_equity_usdt: 1000.0
  max_leverage: 5.0
  max_drawdown_pct: 30.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 3.0

features:
  ema_20:
    indicator: ema
    params: { length: 20 }

  ema_50:
    indicator: ema
    params: { length: 50 }

  rsi_14:
    indicator: rsi
    params: { length: 14 }

  atr_14:
    indicator: atr
    params: { length: 14 }

  adx_14:
    indicator: adx
    params: { length: 14 }

  ema_50_1h:
    indicator: ema
    params: { length: 50 }
    tf: "1h"

actions:
  entry_long:
    all:
      - ["ema_20", "cross_above", "ema_50"]
      - ["adx_14.adx", ">", 25]
      - ["rsi_14", ">", 50]
      - ["close", ">", "ema_50_1h"]

  entry_short:
    all:
      - ["ema_20", "cross_below", "ema_50"]
      - ["adx_14.adx", ">", 25]
      - ["rsi_14", "<", 50]
      - ["close", "<", "ema_50_1h"]

position_policy:
  mode: "short_only"
  exit_mode: "first_hit"
  max_positions_per_symbol: 1

risk_model:
  stop_loss:
    type: "atr_multiple"
    value: 1.5
    atr_feature_id: "atr_14"

  take_profit:
    type: "rr_ratio"
    value: 3.0

  sizing:
    model: "percent_equity"
    value: 20.0
    max_leverage: 5.0

validation:
  pattern: "trend_up_clean"
  bars: 800
  seed: 42

expected:
  min_trades: 3
