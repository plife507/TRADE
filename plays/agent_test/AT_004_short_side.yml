version: "3.0.0"
name: "at_004_short_side"
description: |
  Agent Test 004 - Short-Side Strategy (1m exec)

  Tests: short entry/exit, short_only position policy, downtrend pattern.
  Agent should verify backtest produces short trades.
  JSON output: status == "pass", metrics.trades_count > 0.

symbol: "BTCUSDT"

timeframes:
  low_tf: "1m"
  med_tf: "15m"
  high_tf: "1h"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 2.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  ema_9:
    indicator: ema
    params: {length: 9}
  ema_21:
    indicator: ema
    params: {length: 21}
  rsi_14:
    indicator: rsi
    params: {length: 14}

actions:
  entry_short:
    all:
      - ["ema_9", "cross_below", "ema_21"]
      - ["rsi_14", ">", 45]
  exit_short:
    any:
      - ["ema_9", "cross_above", "ema_21"]

position_policy:
  mode: short_only
  exit_mode: first_hit
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 1.5
  take_profit_pct: 3.0

validation:
  pattern: "trend_down_clean"
