version: "3.0.0"
name: "at_003_multi_tf_structure"
description: |
  Agent Test 003 - Multi-Timeframe with Structure Detection (1m exec)

  Tests: multi-TF indicator resolution, structure detection (swing + trend),
  structure field references in DSL conditions. Agent should verify:
  - backtest run --json: status == "pass"
  - backtest indicators --json: features include cross-TF entries

symbol: "BTCUSDT"

timeframes:
  low_tf: "1m"
  med_tf: "15m"
  high_tf: "1h"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 1.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  ema_9:
    indicator: ema
    params: {length: 9}
  ema_21:
    indicator: ema
    params: {length: 21}
  ema_50_15m:
    indicator: ema
    params: {length: 50}
    tf: "15m"
  rsi_14:
    indicator: rsi
    params: {length: 14}

structures:
  exec:
    - type: swing
      key: swing
      params: {left: 5, right: 5}
    - type: trend
      key: trend
      uses: swing

actions:
  entry_long:
    all:
      - ["ema_9", "cross_above", "ema_21"]
      - ["trend.direction", "==", 1]
      - ["close", ">", "ema_50_15m"]
      - ["rsi_14", "<", 60]
  exit_long:
    any:
      - ["ema_9", "cross_below", "ema_21"]

position_policy:
  mode: long_only
  exit_mode: first_hit
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 1.5
  take_profit_pct: 3.0

validation:
  pattern: "trend_up_clean"
