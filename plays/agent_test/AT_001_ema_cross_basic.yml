version: "3.0.0"
name: "at_001_ema_cross_basic"
description: |
  Agent Test 001 - Basic EMA Crossover (1m exec)

  Minimal play for agent CLI testing. Fast 1m execution.
  Agent should confirm via --json output:
  - status == "pass"
  - metrics.trades_count > 0
  - metrics.net_pnl_usdt is a number

symbol: "BTCUSDT"

timeframes:
  low_tf: "1m"
  med_tf: "15m"
  high_tf: "1h"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 1.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  ema_9:
    indicator: ema
    params: {length: 9}
  ema_21:
    indicator: ema
    params: {length: 21}

actions:
  entry_long:
    all:
      - ["ema_9", "cross_above", "ema_21"]
  exit_long:
    any:
      - ["ema_9", "cross_below", "ema_21"]

position_policy:
  mode: long_only
  exit_mode: first_hit
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 1.5
  take_profit_pct: 3.0

validation:
  pattern: "trend_up_clean"
