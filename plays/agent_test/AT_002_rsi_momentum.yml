version: "3.0.0"
name: "at_002_rsi_momentum"
description: |
  Agent Test 002 - RSI Momentum with ATR Stop (3m exec)

  Tests: backtest with risk_model (ATR-based stop), preflight command,
  indicator listing, normalize command. Agent should verify:
  - backtest run --json: status == "pass", metrics.trades_count > 0
  - backtest preflight --json: status == "pass"
  - backtest indicators --json: status == "pass"

symbol: "BTCUSDT"

timeframes:
  low_tf: "3m"
  med_tf: "15m"
  high_tf: "1h"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 3.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  rsi_14:
    indicator: rsi
    params: {length: 14}
  ema_20:
    indicator: ema
    params: {length: 20}
  atr_14:
    indicator: atr
    params: {length: 14}

actions:
  entry_long:
    all:
      - ["rsi_14", "<", 55]
      - ["close", ">", "ema_20"]
  exit_long:
    any:
      - ["rsi_14", ">", 70]

position_policy:
  mode: long_only
  exit_mode: first_hit
  max_positions_per_symbol: 1

risk_model:
  stop_loss:
    type: "atr_multiple"
    value: 2.0
    atr_feature_id: "atr_14"
  take_profit:
    type: "rr_ratio"
    value: 2.5
  sizing:
    model: "risk_based"
    value: 2.0
    max_leverage: 3.0

validation:
  pattern: "trend_up_clean"
