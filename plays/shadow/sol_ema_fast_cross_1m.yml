version: "3.0.0"
name: "sol_ema_fast_cross_1m"
description: "EMA 5/9 fast crossover on SOLUSDT 1m — shadow signal test"

symbol: "SOLUSDT"

timeframes:
  low_tf: "1m"
  med_tf: "5m"
  high_tf: "15m"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 5.0
  margin_mode: "isolated_usdt"
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  ema_5:
    indicator: ema
    params: {length: 5}
  ema_9:
    indicator: ema
    params: {length: 9}

actions:
  entry_long:
    all:
      - ["ema_5", "cross_above", "ema_9"]
  exit_long:
    any:
      - ["ema_5", "cross_below", "ema_9"]
  entry_short:
    all:
      - ["ema_5", "cross_below", "ema_9"]
  exit_short:
    any:
      - ["ema_5", "cross_above", "ema_9"]

position_policy:
  mode: long_short
  exit_mode: first_hit
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 1.0
  take_profit_pct: 2.0
