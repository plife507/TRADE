version: "3.0.0"
name: "sol_trend_structure_1m"
description: "Swing + trend structure on 1m — shadow structure test"

symbol: "SOLUSDT"

timeframes:
  low_tf: "1m"
  med_tf: "5m"
  high_tf: "15m"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 5.0
  margin_mode: "isolated_usdt"
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  ema_9:
    indicator: ema
    params: {length: 9}

structures:
  exec:
    - type: swing
      key: swing
      params: {left: 3, right: 3}
    - type: trend
      key: trend
      uses: swing

actions:
  entry_long:
    all:
      - ["trend.direction", "==", 1]
      - ["close", ">", "ema_9"]
  exit_long:
    any:
      - ["trend.direction", "==", -1]
  entry_short:
    all:
      - ["trend.direction", "==", -1]
      - ["close", "<", "ema_9"]
  exit_short:
    any:
      - ["trend.direction", "==", 1]

position_policy:
  mode: long_short
  exit_mode: first_hit
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 1.0
  take_profit_pct: 2.0
