version: "3.0.0"
name: "sol_ema_test_fire"
description: "EMA 3/5 on 1m — ultra-fast cross for shadow signal test"

symbol: "SOLUSDT"

timeframes:
  low_tf: "1m"
  med_tf: "5m"
  high_tf: "15m"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 5.0
  margin_mode: "isolated_usdt"
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  ema_3:
    indicator: ema
    params: {length: 3}
  ema_5:
    indicator: ema
    params: {length: 5}

actions:
  entry_long:
    all:
      - ["ema_3", ">", "ema_5"]
  exit_long:
    all:
      - ["ema_3", "<", "ema_5"]
  entry_short:
    all:
      - ["ema_3", "<", "ema_5"]
  exit_short:
    all:
      - ["ema_3", ">", "ema_5"]

position_policy:
  mode: long_short
  exit_mode: first_hit
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 1.0
  take_profit_pct: 2.0
