version: "3.0.0"
name: "v_risk_011_split_tp_3_level"
description: |
  Risk Validation Play 11 - 3-Level Split Take Profit

  Tests multi-level TP: 50% close at 1%, 50% of remaining at 2%, rest at 3%.
  Uses trend_up_clean pattern so price rises through all 3 levels.
  Verifies partial close mechanics and level tracking.

symbol: "BTCUSDT"

timeframes:
  low_tf: "15m"
  med_tf: "1h"
  high_tf: "D"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 1.0
  max_drawdown_pct: 100.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  ema_9:
    indicator: ema
    params: {length: 9}
  ema_21:
    indicator: ema
    params: {length: 21}

actions:
  entry_long:
    all:
      - ["ema_9", "cross_above", "ema_21"]

  exit_long:
    any:
      - ["ema_9", "cross_below", "ema_21"]

risk:
  stop_loss_pct: 5.0
  take_profit_pct: 1.0
  take_profit_levels:
    - {pct: 1.0, size_pct: 50}
    - {pct: 2.0, size_pct: 50}
    - {pct: 3.0, size_pct: 100}

position_policy:
  mode: long_only
  exit_mode: first_hit
  max_positions_per_symbol: 1

validation:
  pattern: "trend_up_clean"
