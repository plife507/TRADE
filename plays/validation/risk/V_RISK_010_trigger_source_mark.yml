version: "3.0.0"
name: "v_risk_010_trigger_source_mark"
description: |
  Risk Validation Play 10 - TP/SL Trigger Source: MarkPrice

  Validates the tp_trigger_by / sl_trigger_by DSL fields flow through
  the pipeline correctly. Uses MarkPrice for TP triggers instead of
  the default LastPrice.

  In backtest mode (mark_source=close), MarkPrice checks a single point
  (bar.close) while LastPrice checks the full wick range (bar.high/low).
  This means MarkPrice triggers are more conservative — TP only fires
  when close reaches the level, not on wicks.

  Uses trend_up_clean pattern with a tight TP. Compared to LastPrice,
  MarkPrice should produce later TP fills or more signal exits.

symbol: "BTCUSDT"

timeframes:
  low_tf: "15m"
  med_tf: "1h"
  high_tf: "D"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 1.0
  max_drawdown_pct: 100.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  ema_9:
    indicator: ema
    params: {length: 9}
  ema_21:
    indicator: ema
    params: {length: 21}

actions:
  entry_long:
    all:
      - ["ema_9", "cross_above", "ema_21"]

  exit_long:
    any:
      - ["ema_9", "cross_below", "ema_21"]

risk:
  stop_loss_pct: 3.0
  take_profit_pct: 1.5
  tp_trigger_by: "MarkPrice"
  sl_trigger_by: "MarkPrice"

position_policy:
  mode: long_only
  exit_mode: first_hit
  max_positions_per_symbol: 1

validation:
  pattern: "trend_up_clean"
