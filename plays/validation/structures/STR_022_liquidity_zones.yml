version: "3.0.0"
name: "str_022_liquidity_zones"
description: |
  Structure Suite - Liquidity zones detection and sweep test.
  Entry on liquidity sweep (swept lows = bullish signal).

symbol: "SOLUSDT"

timeframes:
  low_tf: "15m"
  med_tf: "1h"
  high_tf: "D"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 1.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  atr_14:
    indicator: atr
    params: {length: 14}

structures:
  exec:
    - type: swing
      key: swing
      params: {left: 3, right: 3}
    - type: liquidity_zones
      key: liq
      uses: swing
      params:
        atr_key: atr_14
        tolerance_atr: 0.3
        sweep_atr: 0.1
        min_touches: 2
        max_active: 5

actions:
  entry_long:
    all:
      - ["liq.sweep_this_bar", "==", 1]
      - ["liq.sweep_direction", "==", -1]

position_policy:
  mode: "long_only"
  exit_mode: "sl_tp_only"
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 3.0
  take_profit_pct: 6.0
  max_position_pct: 100.0

validation:
  pattern: "equal_highs_lows"
