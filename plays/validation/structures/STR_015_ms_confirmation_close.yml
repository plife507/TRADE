version: "3.0.0"
name: "str_015_ms_confirmation_close"
description: |
  Structure Suite - Market structure with confirmation_close=true (new default).
  Tests close-based BOS/CHoCH detection on reversal pattern where body closes
  break through swing levels. Validates the ICT/SMC-correct default.

symbol: "BTCUSDT"

timeframes:
  low_tf: "15m"
  med_tf: "1h"
  high_tf: "D"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 1.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  rsi_14:
    indicator: rsi
    params: {length: 14}

structures:
  exec:
    - type: swing
      key: swing
      params: {left: 5, right: 5}

    - type: market_structure
      key: ms_close
      uses: swing
      # confirmation_close: true is now the default — no explicit param needed

    - type: market_structure
      key: ms_wick
      uses: swing
      params:
        confirmation_close: false  # Explicit wick-based for comparison

actions:
  entry_long:
    any:
      - all:
          - ["ms_close.bos_this_bar", "==", 1]
          - ["ms_close.bos_direction", "==", "bullish"]
      - all:
          - ["ms_close.choch_this_bar", "==", 1]
          - ["ms_close.choch_direction", "==", "bullish"]

position_policy:
  mode: "long_only"
  exit_mode: "sl_tp_only"
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 3.0
  take_profit_pct: 6.0
  max_position_pct: 100.0

validation:
  pattern: "reversal_v_bottom"
