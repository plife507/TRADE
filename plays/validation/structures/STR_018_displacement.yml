version: "3.0.0"
name: "str_018_displacement"
description: |
  Structure Suite - Displacement detector test.
  Entry on bullish displacement with ATR confirmation.
  Uses displacement_impulse pattern to create clear impulsive candles.

symbol: "BTCUSDT"

timeframes:
  low_tf: "15m"
  med_tf: "1h"
  high_tf: "D"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 1.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  atr_14:
    indicator: atr
    params: {length: 14}

structures:
  exec:
    - type: displacement
      key: disp
      params:
        atr_key: atr_14
        body_atr_min: 1.5
        wick_ratio_max: 0.4

actions:
  entry_long:
    all:
      - ["disp.is_displacement", "==", 1]
      - ["disp.direction", "==", 1]

position_policy:
  mode: "long_only"
  exit_mode: "sl_tp_only"
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 3.0
  take_profit_pct: 6.0
  max_position_pct: 100.0

validation:
  pattern: "displacement_impulse"
