version: "3.0.0"
name: "str_024_breaker_block"
description: |
  Structure Suite - Breaker block detection test.
  Entry when a bullish breaker block forms (failed bearish OB flips
  to support on CHoCH). Tests full ICT chain: swing -> OB -> MS -> breaker.

symbol: "BTCUSDT"

timeframes:
  low_tf: "15m"
  med_tf: "1h"
  high_tf: "D"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 1.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  atr_14:
    indicator: atr
    params: {length: 14}

structures:
  exec:
    - type: swing
      key: swing
      params: {left: 5, right: 5}
    - type: order_block
      key: ob
      uses: swing
      params:
        atr_key: atr_14
        use_body: true
        body_atr_min: 1.5
        max_active: 5
        lookback: 3
    - type: market_structure
      key: ms
      uses: swing
    - type: breaker_block
      key: brk
      uses: [ob, ms]
      params:
        max_active: 5

actions:
  entry_long:
    all:
      - ["brk.active_bull_count", ">", 0]

position_policy:
  mode: "long_only"
  exit_mode: "sl_tp_only"
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 3.0
  take_profit_pct: 6.0
  max_position_pct: 100.0

validation:
  pattern: "volatile"
