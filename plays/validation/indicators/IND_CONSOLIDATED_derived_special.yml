version: "3.0.0"
name: "ind_consolidated_derived_special"
description: |
  Consolidated indicator validation — Derived price and special indicators.
  Covers: midprice, ohlc4, volume_profile, anchored_volume_profile, session_levels.
  Entry: midprice > EMA 20 (representative derived price filter).

symbol: "BTCUSDT"

timeframes:
  low_tf: "15m"
  med_tf: "1h"
  high_tf: "D"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 1.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  midprice_14:
    indicator: midprice
    params: {length: 14}
  ohlc4:
    indicator: ohlc4
    params: {}
  vp:
    indicator: volume_profile
    params: {}
  avp:
    indicator: anchored_volume_profile
    params: {}
  sl:
    indicator: session_levels
    params: {}
  ema_20:
    indicator: ema
    params: {length: 20}

structures:
  exec: []

actions:
  entry_long:
    all:
      - ["midprice_14", ">", "ema_20"]

position_policy:
  mode: "long_only"
  exit_mode: "sl_tp_only"
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 3.0
  take_profit_pct: 6.0
  max_position_pct: 100.0

validation:
  pattern: "trending"
