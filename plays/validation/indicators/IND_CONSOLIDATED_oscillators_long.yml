version: "3.0.0"
name: "ind_consolidated_oscillators_long"
description: |
  Consolidated indicator validation — Oscillators and momentum (long).
  Covers: rsi, cci, willr, cmo, mfi, stoch, stochrsi, mom, roc, fisher, tsi, trix.
  Entry: RSI > 60 (representative momentum filter).
  All oscillators declared in features to verify computation.

symbol: "BTCUSDT"

timeframes:
  low_tf: "15m"
  med_tf: "1h"
  high_tf: "D"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 1.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  rsi_14:
    indicator: rsi
    params: {length: 14}
  cci_14:
    indicator: cci
    params: {length: 14}
  willr_14:
    indicator: willr
    params: {length: 14}
  cmo_14:
    indicator: cmo
    params: {length: 14}
  mfi_14:
    indicator: mfi
    params: {length: 14}
  stoch_14_3_3:
    indicator: stoch
    params: {k: 14, d: 3, smooth_k: 3}
  stochrsi_14:
    indicator: stochrsi
    params: {length: 14}
  mom_10:
    indicator: mom
    params: {length: 10}
  roc_10:
    indicator: roc
    params: {length: 10}
  fisher_9:
    indicator: fisher
    params: {length: 9}
  tsi_13_25:
    indicator: tsi
    params: {long_length: 25, short_length: 13}
  trix_18_9:
    indicator: trix
    params: {length: 18, signal: 9}
  uo_7_14_28:
    indicator: uo
    params: {short: 7, medium: 14, long: 28}

structures:
  exec: []

actions:
  entry_long:
    all:
      - ["rsi_14", ">", 60]

position_policy:
  mode: "long_only"
  exit_mode: "sl_tp_only"
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 3.0
  take_profit_pct: 6.0
  max_position_pct: 100.0

validation:
  pattern: "trend_up_clean"
