version: "3.0.0"
name: "ind_consolidated_volume_flow"
description: |
  Consolidated indicator validation — Volume and flow indicators.
  Covers: obv, cmf, kvo, vwap, anchored_vwap, atr, natr, adx, psar.
  Entry: CMF > 0 (representative accumulation filter).
  All volume/flow indicators declared to verify computation.

symbol: "BTCUSDT"

timeframes:
  low_tf: "15m"
  med_tf: "1h"
  high_tf: "D"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 1.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  obv:
    indicator: obv
    params: {}
  cmf_20:
    indicator: cmf
    params: {length: 20}
  kvo_34_55:
    indicator: kvo
    params: {short_length: 34, long_length: 55}
  vwap_d:
    indicator: vwap
    params: {anchor: "D"}
  avwap:
    indicator: anchored_vwap
    params: {}
  atr_14:
    indicator: atr
    params: {length: 14}
  natr_14:
    indicator: natr
    params: {length: 14}
  adx_14:
    indicator: adx
    params: {length: 14}
  psar:
    indicator: psar
    params: {}

structures:
  exec: []

actions:
  entry_long:
    all:
      - ["cmf_20", ">", 0]

position_policy:
  mode: "long_only"
  exit_mode: "sl_tp_only"
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 3.0
  take_profit_pct: 6.0
  max_position_pct: 100.0

validation:
  pattern: "accumulation"
