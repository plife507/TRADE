version: "3.0.0"
name: "ind_consolidated_cross_signals"
description: |
  Consolidated indicator validation — Cross-based signal indicators.
  Covers: macd, ppo, ema (cross), sma (cross), wma (cross), dema (cross),
  tema (cross), zlma (cross).
  Entry: EMA 9 cross_above EMA 21 (representative cross signal).
  All cross-capable indicators declared to verify computation.

symbol: "BTCUSDT"

timeframes:
  low_tf: "15m"
  med_tf: "1h"
  high_tf: "D"
  exec: "low_tf"

account:
  starting_equity_usdt: 10000.0
  max_leverage: 1.0
  margin_mode: "isolated_usdt"
  min_trade_notional_usdt: 10.0
  fee_model:
    taker_bps: 5.5
    maker_bps: 2.0
  slippage_bps: 2.0

features:
  ema_9:
    indicator: ema
    params: {length: 9}
  ema_21:
    indicator: ema
    params: {length: 21}
  macd_12_26_9:
    indicator: macd
    params: {fast: 12, slow: 26, signal: 9}
  ppo_12_26_9:
    indicator: ppo
    params: {fast: 12, slow: 26, signal: 9}
  sma_10:
    indicator: sma
    params: {length: 10}
  sma_30:
    indicator: sma
    params: {length: 30}

structures:
  exec: []

actions:
  entry_long:
    all:
      - ["ema_9", "cross_above", "ema_21"]

  exit_long:
    any:
      - ["ema_9", "cross_below", "ema_21"]

position_policy:
  mode: "long_only"
  exit_mode: "first_hit"
  max_positions_per_symbol: 1

risk:
  stop_loss_pct: 3.0
  take_profit_pct: 6.0
  max_position_pct: 100.0

validation:
  pattern: "reversal_v_bottom"
